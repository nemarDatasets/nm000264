methodology: 'Subjects participated in sessions with two runs (Non-Adaptive and Adaptive, randomised order). Each run had
  Training (calibration) and Online phases. In Non-Adaptive mode, Training data calibrated the MDM classifier for Online phase.
  In Adaptive mode, classifier initialized with generic class geometric means from previous experiment and continuously adapted
  using Riemannian method. Brain Invaders interface: 36 symbols in 12 groups, one repetition = 12 flashes (2 Target, 10 non-Target).
  Training phase: 80 Target and 400 non-Target flashes (fixed). Online phase: variable repetitions based on performance to
  destroy targets. Subjects blind to mode of operation.'
