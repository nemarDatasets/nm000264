abstract: This dataset contains electroencephalographic (EEG) recordings of 24 subjects doing a visual P300 Brain-Computer
  Interface experiment on PC. The visual P300 is an event-related potential elicited by visual stimulation, peaking 240-600
  ms after stimulus onset. The experiment was designed to compare the use of a P300-based brain-computer interface with and
  without adaptive calibration using Riemannian geometry. EEG data were recorded using 16 electrodes during an experiment
  at GIPSA-lab, Grenoble, France, in 2013.
